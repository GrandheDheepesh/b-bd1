```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brahmi Surprise 🎁</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow: hidden;
    text-align: center;
}

.floating {
    position: absolute;
    font-size: 30px;
    animation: float 6s infinite linear;
}
@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

.page {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
.active {
    display: flex;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #ff1e4d;
}

.book {
    display: flex;
    width: 70%;
    height: 60%;
    background: white;
    border-radius: 20px;
    overflow: hidden;
}
.left, .right {
    width: 50%;
    padding: 20px;
}
.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.right {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 20px;
}

.slideshow img {
    width: 400px;
    height: 300px;
    border-radius: 15px;
}

.quote {
    font-size: 24px;
    color: white;
    padding: 20px;
}
</style>
</head>

<body>

<div class="floating" style="left:10%">🎈</div>
<div class="floating" style="left:30%">🎂</div>
<div class="floating" style="left:60%">🎉</div>
<div class="floating" style="left:80%">🎈</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mpeg" type="audio/mp3">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <h1>Hey Brahmi 👀</h1>
    <h2>I made something for you… are you ready? 🎁</h2>
    <button onclick="goYes()">YES 😄</button>
    <button onclick="goNo(event)">NO 😅</button>
</div>

<!-- BOOK -->
<div class="page" id="book">
    <div class="book">
        <div class="left">
            <img id="bookImg" src="photo1.jpg">
        </div>
        <div class="right">
            <p id="bookText"></p>
        </div>
    </div>
    <button onclick="nextPage()">Next ➡️</button>
</div>

<!-- SLIDESHOW -->
<div class="page" id="slideshow">
    <h2>Hero material 🔥</h2>
    <div class="slideshow">
        <img id="slideImg" src="">
    </div>
    <button onclick="goFinal()">Next 💖</button>
</div>

<!-- FINAL -->
<div class="page" id="final">
    <div class="quote">
        "Life moves on… things change… and people get busy…  
        But some people never really leave your heart.  
        You are one of those people for me, Brahmi 💙"
    </div>
</div>

<script>

// YES (start music here)
function goYes() {
    showPage("book");
    loadBook();

    let music = document.getElementById("bgMusic");
    music.play().catch(() => {
        console.log("User interaction required to play audio");
    });
}

// NO button
function goNo(event) {
    let btn = event.target;

    let x = Math.random() * (window.innerWidth - btn.offsetWidth);
    let y = Math.random() * (window.innerHeight - btn.offsetHeight);

    btn.style.position = "absolute";
    btn.style.left = x + "px";
    btn.style.top = y + "px";

    let texts = ["NO 😅", "Catch me 😜", "Nope 😂", "Try again 😏"];
    btn.innerText = texts[Math.floor(Math.random() * texts.length)];
}

// Page switch
function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Book
let current = 0;

let pages = [
{ img: "photo1.jpeg", text: "From the very beginning… you were never just a friend 💙" },
{ img: "photo2.jpeg", text: "Small moments became best memories 😄" },
{ img: "photo3.jpeg", text: "You stood by me when others didn’t 🤝" },
{ img: "photo4.jpeg", text: "You’ll always have a place in my life ✨" }
];

function nextPage() {
    current++;
    if (current < pages.length) {
        loadBook();
    } else {
        showPage("slideshow");
        startSlideshow();
    }
}

function loadBook() {
    document.getElementById("bookImg").src = pages[current].img;
    document.getElementById("bookText").innerText = pages[current].text;
}

// Slideshow
let slideIndex = 0;
let slideInterval;

let slideImages = [
    "photo5.jpeg",
    "photo6.jpeg",
    "photo7.jpeg",
    "photo8.jpeg",
    "photo9.jpeg",
    "photo10.jpeg",
    "photo11.jpeg",
    "photo12.jpeg"
];

function startSlideshow() {
    let img = document.getElementById("slideImg");

    img.src = slideImages[0];

    if (slideInterval) clearInterval(slideInterval);

    slideInterval = setInterval(() => {
        slideIndex = (slideIndex + 1) % slideImages.length;
        img.src = slideImages[slideIndex];
    }, 2000);
}

function goFinal() {
    showPage("final");
}

</script>

</body>
</html>
```
